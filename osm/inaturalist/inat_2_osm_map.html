<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNat 2 OSM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #header {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
        #header h1 {
            margin-bottom: 5px;
            color: #333;
        }
        #header p {
            margin: 0;
            color: #666;
        }
        #map {
            height: calc(100vh - 120px);
            width: 100%;
        }
        .popup-content {
            padding: 10px;
            max-width: 300px;
        }
        .popup-content table {
            font-size: 12px;
            width: 100%;
            margin-bottom: 10px;
        }
        .popup-content th {
            text-align: left;
            padding: 2px 5px;
            background-color: #f1f1f1;
        }
        .popup-content td {
            padding: 2px 5px;
            border-bottom: 1px solid #eee;
        }
        .osm-logo, .inat-logo {
            width: 48px;
            height: auto;
            vertical-align: middle;
        }
        .badge-custom {
            margin: 2px;
            display: inline-block;
            background-color: #74ac00;
            color: white;
            text-decoration: none;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .obs-count {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>iNat 2 OSM</h1>
        <p>OSM elements linked with iNaturalist Observations</p>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        const map = L.map('map').setView([46.603354, 1.888334], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        const markers = L.markerClusterGroup();

        fetch('osm_inat.geojson')
            .then(response => response.json())
            .then(data => {
                data.features.forEach(feature => {
                    const coords = feature.geometry.coordinates;
                    const lat = coords[1];
                    const lon = coords[0];
                    const props = feature.properties;
                    const popupContent = createPopupContent(props);
                    markers.addLayer(L.marker([lat, lon]).bindPopup(popupContent));
                });
                map.addLayer(markers);
            });

        function createPopupContent(props) {
            const osmLink = `https://www.openstreetmap.org/${props.type}/${props.id}`;
            const osmIcon = '<img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg" class="osm-logo" alt="OSM Logo">';
            let tagsTable = '<table><tr><th>Key</th><th>Value</th></tr>';
            for (const [key, value] of Object.entries(props.tags)) {
                tagsTable += `<tr><td>${key}</td><td>${value}</td></tr>`;
            }
            tagsTable += '</table>';

            const obsIds = props.obs_ids.split(';');
            let obsBadges = '';
            obsIds.forEach(obsId => {
                obsBadges += `<a href="https://www.inaturalist.org/observations/${obsId}" target="_blank" class="badge-custom">${obsId}</a>`;
            });

            const inatIcon = '<img src="https://static.inaturalist.org/wiki_page_attachments/3154-original.png" class="inat-logo" alt="iNaturalist Logo">';
            const inatLink = `<a href="${props.obs_url}" target="_blank">${inatIcon} All iNat Obs. Link</a>`;

            return `
                <div class="popup-content">
                    <div style="margin-bottom: 10px;">
                        <a href="${osmLink}" target="_blank">${osmIcon} ${props.type}/${props.id}</a>
                    </div>
                    <div class="obs-count">Nb. Observation(s): ${obsIds.length}</div>
                    <div style="margin-bottom: 10px;">${inatLink}</div>
                    <div style="margin-bottom: 10px;">${obsBadges}</div>
                    <div>${tagsTable}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
