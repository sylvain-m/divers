<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNat 2 OSM</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Table CSS -->
    <link href="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1e1e1e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
    }
    h1 {
        color: #ffffff;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2em;
    }
    .log-info {
        text-align: center;
        margin-bottom: 20px;
        color: #a0a0a0;
        font-size: 0.9em;
    }
    .osm-logo, .inat-logo {
        width: 48px;
        height: auto;
        vertical-align: middle;
    }
    #header-container {
      height: 150px;
      display: flex;
      flex-direction: column;    /* Empile les éléments verticalement */
      justify-content: center;   /* Centre verticalement */
      align-items: center;      /* Centre horizontalement */
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;        /* Centre le texte (h1) */
    }
    /* Espacement entre le h1 et le toggle */
    #header-container h1 {
      margin: 0 0 20px 0;  /* Marge en bas pour séparer du toggle */
    }
    #main-container {
      height: calc(100vh - 150px);
      overflow: auto;
    }
    /* Style du toggle switch segmenté */
    .toggle-switch {
      display: flex;
      background: #e9ecef;
      color: black;
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    .toggle-switch input[type="radio"] {
      display: none;
    }
    .toggle-switch label {
      padding: 12px 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch input[type="radio"]:checked + label {
      background: #74ac00;
      color: white;
      font-weight: bold;
    }
    .toggle-switch label:first-child {
      border-radius: 8px 0 0 8px;
    }
    .toggle-switch label:last-child {
      border-radius: 0 8px 8px 0;
    }
    /* Thème sombre pour Bootstrap */
    .table {
        color: #e0e0e0;
        background-color: #1e1e1e;
        border-color: #333;
        table-layout: fixed; /* Pour forcer le respect des largeurs de colonnes */
        width: 100%;
        max-width: 900px; /* Largeur maximale du tableau */
        margin: 0 auto; /* Centrer le tableau */
    }
    .table thead th {
        background-color: #2d2d2d;
        color: #ffffff;
        border-bottom: 1px solid #333;
        position: sticky;
        top: 0;
        z-index: 10;
        max-width: 300px; /* Largeur maximale pour chaque colonne */
        width: 300px; /* Largeur fixe pour chaque colonne */
        text-align: center;
    }
    .table tbody td {
        border-bottom: 1px solid #333;
        background-color: #1e1e1e;
        max-width: 300px; /* Largeur maximale pour chaque colonne */
        width: 300px; /* Largeur fixe pour chaque colonne */
        vertical-align: top; /* Alignement en haut pour le retour à la ligne */
    }
    .table-hover tbody tr:hover {
        background-color: #2a2a2a;
    }
    a {
        color: #4da6ff;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
    /* Badges verts pour les IDs */
    .id-badge {
        background-color: #74ac00;
        color: #ffffff;
        margin: 2px;
        padding: 3px 6px;
        border-radius: 4px;
        display: inline-block;
        font-size: 0.85em;
    }
    /* Images pour OSM et iNaturalist */
    .osm-img {
        width: 32px;
        height: 32px;
        vertical-align: middle;
        margin-right: 8px;
    }
    .inat-img {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        margin-right: 8px;
    }
    /* Conteneur du tableau avec défilement */
    .table-container {
        max-height: calc(100vh - 150px);
        overflow-y: auto;
        overflow-x: auto; /* Débordement horizontal si nécessaire */
        margin-bottom: 20px;
        width: 100%;
        max-width: 900px; /* Largeur maximale du conteneur */
    }
    /* Retour à la ligne pour la colonne obs_ids */
    .obs-ids-cell {
        word-break: break-all;
        white-space: normal;
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  <div id="main-container"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Après jQuery, dans le <body> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.js"></script>
    
    <script>
      // Charge un fichier HTML dans un conteneur
      async function loadHTML(url, containerId) {
        const response = await fetch(url);
        const html = await response.text();
        document.getElementById(containerId).innerHTML = html;
    
        // ✅ Exécute le code spécifique si c'est table.html
        if (url === "table.html") {
          initTable();
        }
      }
    
      // ✅ Fonction dédiée pour initialiser le tableau
      function initTable() {
        fetch('osm_inat.csv') // ✅ Chemin relatif (même dossier que index.html)
          .then(response => {
            if (!response.ok) throw new Error('CSV introuvable');
            return response.text();
          })
          .then(data => {
            const rows = data.split('\n');
            const tableBody = document.getElementById('tableBody');
    
            for (let i = 1; i < rows.length; i++) {
              if (rows[i].trim() === '') continue;
              const rowData = rows[i].match(/(".*?"|[^",]+)(?=\s*,\s*|\s*$)/g) || [];
              const row = document.createElement('tr');
    
              // --- OSM Link ---
              const [osmElement, osmId, osmUrl] = rowData.slice(0, 3).map(s => s?.replace(/"/g, '').trim() || '');
              const osmLinkCell = document.createElement('td');
              const osmLink = document.createElement('a');
              osmLink.href = osmUrl;
              osmLink.target = "_blank";
              const osmImg = document.createElement('img');
              osmImg.src = 'https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg';
              osmImg.className = 'osm-img';
              osmLink.append(osmImg, ` ${osmElement} ${osmId}`);
              osmLinkCell.appendChild(osmLink);
              row.appendChild(osmLinkCell);
    
              // --- iNat Link ---
              const [, , , obsIdsForUrl, obsUrl] = rowData;
              const finalObsUrl = obsUrl || `https://www.inaturalist.org/observations?verifiable=any&id=${obsIdsForUrl?.replace(/;/g, ',')}`;
              const inatLinkCell = document.createElement('td');
              const imgLink = document.createElement('a');
              imgLink.href = finalObsUrl;
              imgLink.target = "_blank";
              const img = document.createElement('img');
              img.src = 'https://static.inaturalist.org/wiki_page_attachments/3154-original.png';
              img.className = 'inat-img';
              const obsCount = (obsIdsForUrl?.split(';').filter(Boolean) || []).length;
              imgLink.append(img, ` ${obsCount} Observation${obsCount > 1 ? 's' : ''}`);
              inatLinkCell.appendChild(imgLink);
              row.appendChild(inatLinkCell);
    
              // --- Obs IDs (badges) ---
              const obsIdsCell = document.createElement('td');
              obsIdsCell.className = 'obs-ids-cell';
              (obsIdsForUrl?.split(';') || []).forEach(id => {
                if (!id.trim()) return;
                const badgeLink = document.createElement('a');
                badgeLink.href = `https://www.inaturalist.org/observations/${id.trim()}`;
                badgeLink.target = "_blank";
                const badge = document.createElement('span');
                badge.className = 'badge bg-success me-1';
                badge.textContent = id.trim();
                badgeLink.appendChild(badge);
                obsIdsCell.appendChild(badgeLink);
              });
              row.appendChild(obsIdsCell);
    
              tableBody.appendChild(row);
            }
            $('#osmTable').bootstrapTable(); // ✅ Initialisation obligatoire
          })
          .catch(error => {
            console.error('Erreur:', error);
            const errorRow = document.createElement('tr');
            const errorCell = document.createElement('td');
            errorCell.colSpan = 3;
            errorCell.textContent = 'Erreur : fichier CSV introuvable ou invalide.';
            errorCell.className = 'text-danger text-center';
            errorRow.appendChild(errorCell);
            document.getElementById('tableBody').appendChild(errorRow);
          });
      }
    
      // Initialise le toggle switch
      async function init() {
        await loadHTML("header.html", "header-container");
        await loadHTML("map.html", "main-container"); // Page par défaut
    
        const radios = document.querySelectorAll('#header-container input[name="page"]');
        radios.forEach(radio => {
          radio.addEventListener('change', async (e) => {
            await loadHTML(`${e.target.value}.html`, "main-container");
          });
        });
      }
    
      init();
    </script>
</body>
</html>
