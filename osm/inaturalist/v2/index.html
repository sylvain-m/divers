<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNat 2 OSM</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Table CSS -->
    <link href="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1e1e1e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
    }
    h1 {
        color: #ffffff;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2em;
    }
    .log-info {
        text-align: center;
        margin-bottom: 20px;
        color: #a0a0a0;
        font-size: 0.9em;
    }
    .osm-logo, .inat-logo {
        width: 48px;
        height: auto;
        vertical-align: middle;
    }
    #header-container {
      height: 150px;
      display: flex;
      flex-direction: column;    /* Empile les éléments verticalement */
      justify-content: center;   /* Centre verticalement */
      align-items: center;      /* Centre horizontalement */
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;        /* Centre le texte (h1) */
    }
    /* Espacement entre le h1 et le toggle */
    #header-container h1 {
      margin: 0 0 20px 0;  /* Marge en bas pour séparer du toggle */
    }
    #main-container {
      height: calc(100vh - 150px);
      overflow: auto;
    }
    /* Style du toggle switch segmenté */
    .toggle-switch {
      display: flex;
      background: #e9ecef;
      color: black;
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    .toggle-switch input[type="radio"] {
      display: none;
    }
    .toggle-switch label {
      padding: 12px 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch input[type="radio"]:checked + label {
      background: #74ac00;
      color: white;
      font-weight: bold;
    }
    .toggle-switch label:first-child {
      border-radius: 8px 0 0 8px;
    }
    .toggle-switch label:last-child {
      border-radius: 0 8px 8px 0;
    }
    /* Thème sombre pour Bootstrap */
    .table {
        color: #e0e0e0;
        background-color: #1e1e1e;
        border-color: #333;
        table-layout: fixed; /* Pour forcer le respect des largeurs de colonnes */
        width: 100%;
        max-width: 900px; /* Largeur maximale du tableau */
        margin: 0 auto; /* Centrer le tableau */
    }
    .table thead th {
        background-color: #2d2d2d;
        color: #ffffff;
        border-bottom: 1px solid #333;
        position: sticky;
        top: 0;
        z-index: 10;
        max-width: 300px; /* Largeur maximale pour chaque colonne */
        width: 300px; /* Largeur fixe pour chaque colonne */
        text-align: center;
    }
    .table tbody td {
        border-bottom: 1px solid #333;
        background-color: #1e1e1e;
        max-width: 300px; /* Largeur maximale pour chaque colonne */
        width: 300px; /* Largeur fixe pour chaque colonne */
        vertical-align: top; /* Alignement en haut pour le retour à la ligne */
    }
    .table-hover tbody tr:hover {
        background-color: #2a2a2a;
    }
    a {
        color: #4da6ff;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
    /* Badges verts pour les IDs */
    .id-badge {
        background-color: #74ac00;
        color: #ffffff;
        margin: 2px;
        padding: 3px 6px;
        border-radius: 4px;
        display: inline-block;
        font-size: 0.85em;
    }
    /* Images pour OSM et iNaturalist */
    .osm-img {
        width: 32px;
        height: 32px;
        vertical-align: middle;
        margin-right: 8px;
    }
    .inat-img {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        margin-right: 8px;
    }
    /* Conteneur du tableau avec défilement */
    .table-container {
        max-height: calc(100vh - 150px);
        overflow-y: auto;
        overflow-x: auto; /* Débordement horizontal si nécessaire */
        margin-bottom: 20px;
        width: 100%;
        max-width: 900px; /* Largeur maximale du conteneur */
    }
    /* Retour à la ligne pour la colonne obs_ids */
    .obs-ids-cell {
        word-break: break-all;
        white-space: normal;
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  <div id="main-container"></div>

  <script>
    // Charge un fichier HTML dans un conteneur
    async function loadHTML(url, containerId) {
      const response = await fetch(url);
      const html = await response.text();
      document.getElementById(containerId).innerHTML = html;
    }

    // Initialise le toggle switch
    async function init() {
      await loadHTML("header.html", "header-container");
      await loadHTML("map.html", "main-container"); // Page par défaut

      // Écoute les changements de sélection
      const radios = document.querySelectorAll('#header-container input[name="page"]');
      radios.forEach(radio => {
        radio.addEventListener('change', async (e) => {
          await loadHTML(`${e.target.value}.html`, "main-container");
        });
      });
    }

    // Démarre au chargement
    init();
  </script>
</body>
</html>
