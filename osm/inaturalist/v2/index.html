<!DOCTYPE html>
<html>
<head>
  <!-- Métadonnées et CSS (inchangé) -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iNat 2 OSM</title>
  <!-- Bootstrap 5 CSS + Bootstrap Table CSS + Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* Tes styles existants (inchangés) */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e1e;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
    }
    #header-container {
      height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    #header-container h1 {
      margin: 0 0 20px 0;
    }
    #main-container {
      height: calc(100vh - 150px);
      overflow: auto;
    }
    /* Style des pages (nouveau) */
    .page {
      display: none; /* Toutes les pages sont cachées par défaut */
    }
    .page.active {
      display: block; /* Seule la page active est affichée */
    }
    /* Styles du toggle switch (inchangés) */
    .toggle-switch {
      display: flex;
      background: #e9ecef;
      color: black;
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    /* ... (le reste de ton CSS existant) */
  </style>
</head>
<body>
  <!-- Bandeau (inchangé) -->
  <div id="header-container">
    <h1>iNat 2 OSM</h1>
    <div class="toggle-switch">
      <input type="radio" id="map" name="page" value="map" checked>
      <label for="map">Carte</label>
      <input type="radio" id="table" name="page" value="table">
      <label for="table">Tableau</label>
      <input type="radio" id="graph" name="page" value="graph">
      <label for="graph">Graphique</label>
    </div>
  </div>

  <!-- Conteneur principal -->
  <div id="main-container">
    <!-- Page Carte (remplace map.html) -->
    <div id="map-page" class="page active">
      <!-- Contenu de ta page "Carte" ici -->
      <p>Contenu de la carte...</p>
    </div>

    <!-- Page Tableau (remplace table.html) -->
    <div id="table-page" class="page">
      <div class="table-container">
        <table
          id="osmTable"
          class="table table-hover table-borderless"
          data-height="100%"
          data-pagination="false"
          data-search="false"
          data-show-columns="false"
          data-show-refresh="false"
          data-show-toggle="false">
          <thead>
            <tr>
              <th>OSM Link</th>
              <th>iNat Link</th>
              <th>iNat Observations IDs</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Page Graphique (remplace graph.html) -->
    <div id="graph-page" class="page">
      <!-- Contenu de ta page "Graphique" ici -->
      <p>Contenu du graphique...</p>
    </div>
  </div>

  <!-- Bibliothèques JS (inchangées) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.js"></script>

  <!-- Code JS pour le toggle et le tableau -->
  <script>
    // Initialise le toggle switch
    document.querySelectorAll('input[name="page"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        // Masque toutes les pages
        document.querySelectorAll('.page').forEach(page => {
          page.classList.remove('active');
        });
        // Affiche la page sélectionnée
        document.getElementById(`${e.target.value}-page`).classList.add('active');

        // ✅ Initialise le tableau UNIQUEMENT quand la page "table" est sélectionnée
        if (e.target.value === 'table') {
          initTable();
        }
      });
    });

    // Fonction pour initialiser le tableau (inchangée)
    function initTable() {
      fetch('osm_inat.csv')
        .then(response => {
          if (!response.ok) throw new Error('CSV introuvable');
          return response.text();
        })
        .then(data => {
          const rows = data.split('\n');
          const tableBody = document.getElementById('tableBody');

          // Efface le contenu actuel
          tableBody.innerHTML = '';

          for (let i = 1; i < rows.length; i++) {
            if (rows[i].trim() === '') continue;
            const cleanRowData = rows[i].match(/(".*?"|[^",]+)(?=\s*,\s*|\s*$)/g)
              .map(s => s?.replace(/"/g, '').trim() || '');
            const [osmElement, osmId, osmUrl, obsIdsForUrl, obsUrl] = cleanRowData;
            const row = document.createElement('tr');

            // OSM Link
            const osmLinkCell = document.createElement('td');
            const osmLink = document.createElement('a');
            osmLink.href = osmUrl;
            osmLink.target = "_blank";
            const osmImg = document.createElement('img');
            osmImg.src = 'https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg';
            osmImg.className = 'osm-img';
            osmLink.append(osmImg, ` ${osmElement} ${osmId}`);
            osmLinkCell.appendChild(osmLink);
            row.appendChild(osmLinkCell);

            // iNat Link
            const inatLinkCell = document.createElement('td');
            const finalObsUrl = obsUrl || `https://www.inaturalist.org/observations?verifiable=any&id=${obsIdsForUrl?.replace(/;/g, ',')}`;
            const imgLink = document.createElement('a');
            imgLink.href = finalObsUrl;
            imgLink.target = "_blank";
            const img = document.createElement('img');
            img.src = 'https://static.inaturalist.org/wiki_page_attachments/3154-original.png';
            img.className = 'inat-img';
            const obsCount = (obsIdsForUrl?.split(';').filter(Boolean) || []).length;
            imgLink.append(img, ` ${obsCount} Observation${obsCount > 1 ? 's' : ''}`);
            inatLinkCell.appendChild(imgLink);
            row.appendChild(inatLinkCell);

            // Obs IDs
            const obsIdsCell = document.createElement('td');
            obsIdsCell.className = 'obs-ids-cell';
            (obsIdsForUrl?.split(';') || []).forEach(id => {
              if (!id.trim()) return;
              const badgeLink = document.createElement('a');
              badgeLink.href = `https://www.inaturalist.org/observations/${id.trim()}`;
              badgeLink.target = "_blank";
              const badge = document.createElement('span');
              badge.className = 'badge bg-success me-1';
              badge.textContent = id.trim();
              badgeLink.appendChild(badge);
              obsIdsCell.appendChild(badgeLink);
            });
            row.appendChild(obsIdsCell);

            tableBody.appendChild(row);
          }

          // Initialise Bootstrap Table APRÈS avoir peuplé le tbody
          $('#osmTable').bootstrapTable({
            clickToSelect: false,
            singleSelect: false
          });
        })
        .catch(error => {
          console.error('Erreur:', error);
          const errorRow = document.createElement('tr');
          const errorCell = document.createElement('td');
          errorCell.colSpan = 3;
          errorCell.textContent = 'Erreur : fichier CSV introuvable ou invalide.';
          errorCell.className = 'text-danger text-center';
          errorRow.appendChild(errorCell);
          document.getElementById('tableBody').appendChild(errorRow);
        });
    }

    // ✅ Initialise le tableau par défaut si la page "table" est active au chargement
    if (document.querySelector('input[name="page"]:checked').value === 'table') {
      initTable();
    }
  </script>
</body>
</html>
