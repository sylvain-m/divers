<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iNat 2 OSM</title>

  <!-- Bootstrap 5 + Bootstrap Table + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* ===== TON CSS EXISTANT (INTÉGRAL) ===== */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1e1e1e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
    }
    h1 {
        color: #ffffff;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2em;
    }
    h1 a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }
    .log-info {
        text-align: center;
        margin-bottom: 20px;
        color: #a0a0a0;
        font-size: 0.9em;
    }
    .osm-logo, .inat-logo {
        width: 48px;
        height: auto;
        vertical-align: middle;
    }
    #header-container {
      height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    #header-container h1 {
      margin: 0 0 20px 0;
    }
    #main-container {
      height: calc(100vh - 150px);
      overflow: auto;
    }
    .toggle-switch {
      display: flex;
      background: #e9ecef;
      color: black;
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    .toggle-switch input[type="radio"] {
      display: none;
    }
    .toggle-switch label {
      padding: 12px 24px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-switch input[type="radio"]:checked + label {
      background: #74ac00;
      color: white;
      font-weight: bold;
    }
    .toggle-switch label:first-child {
      border-radius: 8px 0 0 8px;
    }
    .toggle-switch label:last-child {
      border-radius: 0 8px 8px 0;
    }
    .table {
        color: #e0e0e0;
        background-color: #1e1e1e;
        border-color: #333;
        table-layout: fixed;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
    }
    .table thead th {
        background-color: #2d2d2d;
        color: #ffffff;
        border-bottom: 1px solid #333;
        position: sticky;
        top: 0;
        z-index: 10;
        max-width: 300px;
        width: 300px;
        text-align: center;
    }
    .table tbody td {
        border-bottom: 1px solid #333;
        background-color: #1e1e1e;
        max-width: 300px;
        width: 300px;
        vertical-align: top;
    }
    .table-hover tbody tr:hover {
        background-color: #2a2a2a;
    }
    a {
        color: #4da6ff;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
    .id-badge {
        background-color: #74ac00;
        color: #ffffff;
        margin: 2px;
        padding: 3px 6px;
        border-radius: 4px;
        display: inline-block;
        font-size: 0.85em;
    }
    .osm-img {
        width: 32px;
        height: 32px;
        vertical-align: middle;
        margin-right: 8px;
    }
    .inat-img {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        margin-right: 8px;
    }
    .table-container {
        max-height: calc(100vh - 150px);
        overflow-y: auto;
        overflow-x: auto;
        margin: 0 auto;
        width: 100%;
        max-width: 900px;
    }
    .obs-ids-cell {
        word-break: break-all;
        white-space: normal;
    }

    /* ===== NOUVEAUX STYLES ===== */
    .page {
      display: none;
      height: 100%;
    }
    .page.active {
      display: block;
    }
    /* Fix pour les icônes Bootstrap Icons dans le toggle */
    .toggle-switch i {
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <!-- Header avec ton contenu exact -->
  <div id="header-container">
    <h1>
      <a href="https://www.inaturalist.org" target="_blank">
        <img src="https://static.inaturalist.org/wiki_page_attachments/3154-original.png" class="inat-logo" alt="iNaturalist Logo">
      </a>
      iNat 2 OSM
      <a href="https://www.openstreetmap.org" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg" class="osm-logo" alt="OpenStreetMap Logo">
      </a>
    </h1>
    <div class="toggle-switch">
      <input type="radio" id="map" name="page" value="map" checked>
      <label for="map"><i class="bi bi-map"></i> Map</label>

      <input type="radio" id="table" name="page" value="table">
      <label for="table"><i class="bi bi-table"></i> Table</label>

      <input type="radio" id="graph" name="page" value="graph">
      <label for="graph"><i class="bi bi-graph-up"></i> Graph</label>
    </div>
  </div>

  <!-- Conteneur principal -->
  <div id="main-container">
    <!-- Page Carte -->
    <div id="map-page" class="page active">
      <p>Contenu de la carte...</p>
    </div>

    <!-- Page Tableau -->
    <div id="table-page" class="page">
      <div class="table-container">
        <!-- ✅ Tableau SANS data-toggle="table" (pour éviter les conflits) -->
        <table id="osmTable" class="table table-hover table-borderless"></table>
      </div>
    </div>

    <!-- Page Graphique -->
    <div id="graph-page" class="page">
      <p>Contenu du graphique...</p>
    </div>
  </div>

  <!-- Bibliothèques JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.js"></script>

  <script>
    // Toggle entre les pages
    document.querySelectorAll('input[name="page"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        document.querySelectorAll('.page').forEach(page => {
          page.classList.remove('active');
        });
        document.getElementById(`${e.target.value}-page`).classList.add('active');

        // Initialise le tableau SI on passe sur la page "table"
        if (e.target.value === 'table') {
          initTable();
        }
      });
    });

    // Initialise le tableau au chargement si la page "table" est active
    if (document.querySelector('input[name="page"]:checked').value === 'table') {
      initTable();
    }

    // Variable globale pour éviter les réinitialisations multiples
    let tableInitialized = false;
    
    function initTable() {
      // ✅ 1. Si déjà initialisé, on ne fait rien
      if (tableInitialized) return;
      tableInitialized = true;
    
      fetch('osm_inat.csv')
        .then(response => {
          if (!response.ok) throw new Error('CSV introuvable');
          return response.text();
        })
        .then(data => {
          const rows = data.split('\n');
          const tableData = [];
    
          for (let i = 1; i < rows.length; i++) {
            if (rows[i].trim() === '') continue;
            const cleanRowData = rows[i].match(/(".*?"|[^",]+)(?=\s*,\s*|\s*$)/g)
              .map(s => s?.replace(/"/g, '').trim() || '');
            const [osmElement, osmId, osmUrl, obsIdsForUrl, obsUrl] = cleanRowData;
    
            const osmLink = `
              <a href="${osmUrl}" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg" class="osm-img">
                ${osmElement} ${osmId}
              </a>`;
    
            const obsCount = (obsIdsForUrl?.split(';').filter(Boolean) || []).length;
            const inatLink = `
              <a href="${obsUrl || `https://www.inaturalist.org/observations?verifiable=any&id=${obsIdsForUrl?.replace(/;/g, ',')}`}" target="_blank">
                <img src="https://static.inaturalist.org/wiki_page_attachments/3154-original.png" class="inat-img">
                ${obsCount} Observation${obsCount > 1 ? 's' : ''}
              </a>`;
    
            const obsIds = (obsIdsForUrl?.split(';') || [])
              .filter(id => id.trim())
              .map(id => `
                <a href="https://www.inaturalist.org/observations/${id.trim()}" target="_blank" class="id-badge">
                  ${id.trim()}
                </a>`)
              .join(' ');
    
            tableData.push({
              osm_link: osmLink,
              inat_link: inatLink,
              obs_ids: obsIds
            });
          }
    
          // ✅ 2. Désactive Bootstrap Table s'il existe déjà
          if ($('#osmTable').hasClass('bootstrap-table')) {
            $('#osmTable').bootstrapTable('destroy');
            $('#osmTable').empty(); // Vide le tableau
          }
    
          // ✅ 3. Initialise avec TOUTES les options pour désactiver les fonctionnalités automatiques
          $('#osmTable').bootstrapTable({
            data: tableData,
            columns: [
              { field: 'osm_link', title: 'OSM Link', align: 'center' },
              { field: 'inat_link', title: 'iNat Link', align: 'center' },
              { field: 'obs_ids', title: 'iNat Observations IDs', align: 'center' }
            ],
            height: '100%',
            pagination: false,
            search: false,
            showColumns: false,
            showRefresh: false,
            showToggle: false,
            clickToSelect: false,
            singleSelect: false,
            detailView: false,
            cardView: false,
            undefinedText: '',
            escape: false,
            // ✅ 4. Désactive la génération automatique des entêtes
            showHeader: true, // Affiche les entêtes (mais une seule fois)
            headerStyle: function() {
              return { display: '' }; // Style par défaut
            }
          });
        })
        .catch(error => {
          console.error('Erreur:', error);
          if (!$('#osmTable').hasClass('bootstrap-table')) {
            $('#osmTable').bootstrapTable({
              data: [{
                osm_link: '<span class="text-danger">Erreur : fichier CSV introuvable</span>',
                inat_link: '',
                obs_ids: ''
              }],
              columns: [
                { field: 'osm_link', title: 'OSM Link' },
                { field: 'inat_link', title: 'iNat Link' },
                { field: 'obs_ids', title: 'iNat Observations IDs' }
              ]
            });
          }
        });
    }
  </script>
</body>
</html>
