<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Map with iNaturalist Thumbnails (MarkerCluster + Pagination)</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <!-- Bootstrap CSS pour le badge -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 100vh; }
        .leaflet-popup-content { max-width: 350px; padding: 10px; }
        .observation-thumbnail {
            width: 80px; height: 80px; object-fit: cover;
            margin: 5px; border-radius: 4px; border: 1px solid #ddd;
            display: inline-block;
        }
        .popup-content { text-align: center; }
        .pagination {
            margin-top: 10px; display: flex;
            justify-content: center; gap: 10px;
        }
        .pagination button {
            padding: 5px 10px; cursor: pointer;
            background-color: #f0f0f0; border: 1px solid #ccc;
            border-radius: 4px;
        }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { color: #666; font-style: italic; }
        .error { color: #d32f2f; }
        .thumbnail-row { display: flex; justify-content: center; margin: 5px 0; }
        .observation-count {
            font-size: 14px;
            margin: 5px 0;
        }
        /* Badge vert personnalisé */
        .badge-observations {
            background-color: #7cb518;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            text-decoration: none;
            display: inline-block;
        }
        .observation-link {
            color: #333;
            text-decoration: none;
        }
        .observation-link:hover {
            text-decoration: underline;
        }
        /* Style pour les icônes Wikidata et Wikipedia */
        .icon-wikidata, .icon-wikipedia {
            width: 12px;
            height: 12px;
            margin-left: 5px;
            vertical-align: middle;
        }
        .tag-info {
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        // Initialize the map
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Custom tree icon
        const treeIcon = L.icon({
            iconUrl: '../../tree.png',
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        // Create a marker cluster group
        const markers = L.markerClusterGroup();

        // Function to fetch thumbnails for a subset of observation IDs
        async function fetchObservationThumbnails(obsIds, startIndex = 0, count = 9) {
            const ids = obsIds.split(';').slice(startIndex, startIndex + count);
            const thumbnails = [];

            for (const id of ids) {
                try {
                    const apiUrl = `https://api.inaturalist.org/v1/observations/${id}`;
                    const response = await fetch(apiUrl);
                    if (!response.ok) continue;
                    const data = await response.json();
                    const observation = data.results[0];
                    if (observation?.photos?.[0]) {
                        const photo = observation.photos[0];
                        const thumbnailUrl = photo.url.replace(/square|small|medium|large|original/, "small");
                        thumbnails.push({
                            id: observation.id,
                            url: thumbnailUrl,
                            taxon: observation.taxon?.name || "Unknown",
                            user: observation.user.login,
                            date: new Date(observation.observed_on).toLocaleDateString("en-US")
                        });
                    }
                } catch (error) {
                    console.error(`Error for observation ${id}:`, error);
                }
            }
            return thumbnails;
        }

        // Function to create static popup content (without thumbnails)
        function createStaticPopupContent(feature, totalObservations) {
            const osmUrl = feature.properties.osm_url;
            const inatLink = `https://www.inaturalist.org/observations?verifiable=any&place_id=any&field:OpenStreetMap%20(OSM)=${encodeURIComponent(osmUrl)}`;
            const tags = feature.properties.tags || {};

            let content = `
                <div class="popup-content">
                    <h3>${tags.name || "Observation"}</h3>
                    <p><strong>OSM:</strong> <a href="${osmUrl}" target="_blank">${feature.properties.osm_element} ${feature.properties.osm_id}</a></p>
                    <p class="observation-count">
                        <a href="${inatLink}" target="_blank" class="observation-link">
                            <span class="badge-observations">${totalObservations}</span> iNaturalist Observations
                        </a>
                    </p>
            `;

            // Add genus if present AND species is not present
            if (tags.genus && !tags.species) {
                content += `<p class="tag-info"><strong>Genus:</strong> ${tags.genus}</p>`;
            }

            // Add species if present
            if (tags.species) {
                content += `<p class="tag-info"><strong>Species:</strong> ${tags.species}`;
                // Add Wikidata icon if species:wikidata is present
                if (tags['species:wikidata']) {
                    content += ` <a href="https://www.wikidata.org/wiki/${tags['species:wikidata']}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Wikidata-logo.svg/12px-Wikidata-logo.svg.png" class="icon-wikidata" alt="Wikidata"></a>`;
                }
                // Add Wikipedia icon if species:wikipedia is present
                if (tags['species:wikipedia']) {
                    content += ` <a href="https://wikipedia.org/wiki/${tags['species:wikipedia']}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Notification-icon-Wikipedia-logo.svg/12px-Notification-icon-Wikipedia-logo.svg.png" class="icon-wikipedia" alt="Wikipedia"></a>`;
                }
                content += `</p>`;
            }

            // Add Wikipedia link if present
            if (tags.wikipedia) {
                content += `<p class="tag-info"><a href="https://wikipedia.org/wiki/${tags.wikipedia}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Notification-icon-Wikipedia-logo.svg/12px-Notification-icon-Wikipedia-logo.svg.png" class="icon-wikipedia" alt="Wikipedia"> Wikipedia: ${tags.wikipedia}</a></p>`;
            }

            content += `<p class="loading">Loading thumbnails...</p>`;
            content += `</div>`;
            return content;
        }

        // Function to create full popup content with thumbnails and pagination
        function createPopupContent(thumbnails, feature, currentPage, totalObservations) {
            const itemsPerPage = 9;
            const totalPages = Math.ceil(totalObservations / itemsPerPage);
            const osmUrl = feature.properties.osm_url;
            const inatLink = `https://www.inaturalist.org/observations?verifiable=any&place_id=any&field:OpenStreetMap%20(OSM)=${encodeURIComponent(osmUrl)}`;
            const tags = feature.properties.tags || {};

            let content = `
                <div class="popup-content">
                    <h3>${tags.name || "Observation"}</h3>
                    <p><strong>OSM:</strong> <a href="${osmUrl}" target="_blank">${feature.properties.osm_element} ${feature.properties.osm_id}</a></p>
                    <p class="observation-count">
                        <a href="${inatLink}" target="_blank" class="observation-link">
                            <span class="badge-observations">${totalObservations}</span> iNaturalist Observations
                        </a>
                    </p>
            `;

            // Add genus if present AND species is not present
            if (tags.genus && !tags.species) {
                content += `<p class="tag-info"><strong>Genus:</strong> ${tags.genus}</p>`;
            }

            // Add species if present
            if (tags.species) {
                content += `<p class="tag-info"><strong>Species:</strong> ${tags.species}`;
                // Add Wikidata icon if species:wikidata is present
                if (tags['species:wikidata']) {
                    content += ` <a href="https://www.wikidata.org/wiki/${tags['species:wikidata']}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Wikidata-logo.svg/12px-Wikidata-logo.svg.png" class="icon-wikidata" alt="Wikidata"></a>`;
                }
                // Add Wikipedia icon if species:wikipedia is present
                if (tags['species:wikipedia']) {
                    content += ` <a href="https://wikipedia.org/wiki/${tags['species:wikipedia']}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Notification-icon-Wikipedia-logo.svg/12px-Notification-icon-Wikipedia-logo.svg.png" class="icon-wikipedia" alt="Wikipedia"></a>`;
                }
                content += `</p>`;
            }

            // Add Wikipedia link if present
            if (tags.wikipedia) {
                content += `<p class="tag-info"><a href="https://wikipedia.org/wiki/${tags.wikipedia}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Notification-icon-Wikipedia-logo.svg/12px-Notification-icon-Wikipedia-logo.svg.png" class="icon-wikipedia" alt="Wikipedia"> Wikipedia: ${tags.wikipedia}</a></p>`;
            }

            // Display thumbnails in a 3x3 grid
            for (let i = 0; i < thumbnails.length; i += 3) {
                content += `<div class="thumbnail-row">`;
                for (let j = i; j < Math.min(i + 3, thumbnails.length); j++) {
                    const thumb = thumbnails[j];
                    content += `
                        <a href="https://www.inaturalist.org/observations/${thumb.id}" target="_blank">
                            <img class="observation-thumbnail" src="${thumb.url}" alt="Observation ${thumb.id}" title="${thumb.taxon}">
                        </a>
                    `;
                }
                content += `</div>`;
            }

            // Add pagination buttons
            if (totalPages > 1) {
                content += `
                    <div class="pagination">
                        <button onclick="changePage(${currentPage - 1}, '${feature.properties.obs_ids}', ${totalObservations}, this)"
                                ${currentPage === 0 ? 'disabled' : ''}>Previous</button>
                        <span>Page ${currentPage + 1} / ${totalPages}</span>
                        <button onclick="changePage(${currentPage + 1}, '${feature.properties.obs_ids}', ${totalObservations}, this)"
                                ${currentPage === totalPages - 1 ? 'disabled' : ''}>Next</button>
                    </div>
                `;
            }

            content += `</div>`;
            return content;
        }

        // Function to change page
        async function changePage(newPage, obsIds, totalObservations, buttonElement) {
            const popup = buttonElement.closest('.leaflet-popup');
            const feature = popup.options.feature;
            const thumbnails = await fetchObservationThumbnails(obsIds, newPage * 9, 9);
            popup.setContent(createPopupContent(thumbnails, feature, newPage, totalObservations));
        }

        // Load GeoJSON and add markers to the map
        async function loadGeoJSON() {
            try {
                const response = await fetch('osm_inat.geojson');
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const geojson = await response.json();

                // Add markers to the cluster group with custom icon
                L.geoJSON(geojson, {
                    pointToLayer: (feature, latlng) => {
                        const marker = L.marker(latlng, {
                            icon: treeIcon,
                            title: feature.properties.tags.name || "Observation"
                        });
                        // Store feature directly in the marker
                        marker.feature = feature;
                        return marker;
                    },
                    onEachFeature: (feature, layer) => {
                        layer.on('click', async () => {
                            const obsIds = feature.properties.obs_ids;
                            if (!obsIds) {
                                layer.bindPopup("<p>No iNaturalist observations associated.</p>").openPopup();
                                return;
                            }

                            const totalObservations = obsIds.split(';').length;

                            // Display static content immediately
                            layer.bindPopup(createStaticPopupContent(feature, totalObservations)).openPopup();

                            // Fetch thumbnails in the background
                            const thumbnails = await fetchObservationThumbnails(obsIds, 0, 9);

                            // Store feature in popup.options for pagination
                            const popup = layer.getPopup();
                            popup.options.feature = feature;

                            // Update popup content with thumbnails
                            layer.setPopupContent(createPopupContent(thumbnails, feature, 0, totalObservations));
                        });
                    }
                }).addTo(markers);

                // Add the marker cluster group to the map
                map.addLayer(markers);

                // Fit map to show all data
                map.fitBounds(markers.getBounds());
            } catch (error) {
                console.error("Error loading GeoJSON:", error);
                alert("Error loading GeoJSON. Check if the file is accessible.");
            }
        }

        window.onload = loadGeoJSON;
    </script>
</body>
</html>
