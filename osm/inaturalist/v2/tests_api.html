<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Leaflet avec vignettes iNaturalist (pagination)</title>
    <!-- Feuille de style pour Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .leaflet-popup-content {
            max-width: 350px;
            padding: 10px;
        }
        .observation-thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            margin: 5px;
            border-radius: 4px;
            border: 1px solid #ddd;
            display: inline-block;
        }
        .popup-content {
            text-align: center;
        }
        .pagination {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .pagination button {
            padding: 5px 10px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        .error {
            color: #d32f2f;
        }
        .thumbnail-row {
            display: flex;
            justify-content: center;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Bibliothèque Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialisation de la carte
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Cache pour stocker les vignettes déjà chargées
        const thumbnailCache = {};

        // Fonction pour récupérer les vignettes des observations
        async function fetchObservationThumbnails(obsIds) {
            const ids = obsIds.split(';');
            const thumbnails = [];

            for (const id of ids) {
                if (thumbnailCache[id]) {
                    thumbnails.push(thumbnailCache[id]);
                    continue;
                }

                try {
                    const apiUrl = `https://api.inaturalist.org/v1/observations/${id}`;
                    const response = await fetch(apiUrl);
                    if (!response.ok) {
                        console.error(`Erreur pour l'observation ${id}: ${response.status}`);
                        continue;
                    }
                    const data = await response.json();
                    const observation = data.results[0];

                    if (observation && observation.photos && observation.photos.length > 0) {
                        const photo = observation.photos[0];
                        const thumbnailUrl = photo.url.replace(/square|small|medium|large|original/, "small");
                        const thumbnail = {
                            id: observation.id,
                            url: thumbnailUrl,
                            taxon: observation.taxon ? observation.taxon.name : "Inconnu",
                            user: observation.user.login,
                            date: new Date(observation.observed_on).toLocaleDateString("fr-FR")
                        };
                        thumbnails.push(thumbnail);
                        thumbnailCache[id] = thumbnail; // Stockage dans le cache
                    }
                } catch (error) {
                    console.error(`Erreur pour l'observation ${id}:`, error);
                }
            }

            return thumbnails;
        }

        // Fonction pour créer le contenu de l'infobulle avec pagination
        function createPopupContent(thumbnails, feature, currentPage = 0) {
            const itemsPerPage = 9;
            const totalPages = Math.ceil(thumbnails.length / itemsPerPage);
            const startIndex = currentPage * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, thumbnails.length);
            const currentThumbnails = thumbnails.slice(startIndex, endIndex);

            let content = `<div class="popup-content">`;
            content += `<h3>${feature.properties.tags.name || "Observation"}</h3>`;
            content += `<p><strong>OSM:</strong> <a href="${feature.properties.osm_url}" target="_blank">${feature.properties.osm_element} ${feature.properties.osm_id}</a></p>`;

            // Affichage des vignettes (3x3)
            for (let i = 0; i < currentThumbnails.length; i += 3) {
                content += `<div class="thumbnail-row">`;
                for (let j = i; j < Math.min(i + 3, currentThumbnails.length); j++) {
                    const thumb = currentThumbnails[j];
                    content += `
                        <a href="https://www.inaturalist.org/observations/${thumb.id}" target="_blank">
                            <img class="observation-thumbnail" src="${thumb.url}" alt="Observation ${thumb.id}" title="${thumb.taxon}">
                        </a>
                    `;
                }
                content += `</div>`;
            }

            // Ajout de la pagination
            if (totalPages > 1) {
                content += `<div class="pagination">`;
                content += `<button onclick="changePage(${currentPage - 1}, '${feature.properties.obs_ids}', this)" ${currentPage === 0 ? 'disabled' : ''}>Précédent</button>`;
                content += `<span>Page ${currentPage + 1} / ${totalPages}</span>`;
                content += `<button onclick="changePage(${currentPage + 1}, '${feature.properties.obs_ids}', this)" ${currentPage === totalPages - 1 ? 'disabled' : ''}>Suivant</button>`;
                content += `</div>`;
            }

            content += `</div>`;
            return content;
        }

        // Fonction pour changer de page
        async function changePage(newPage, obsIds, buttonElement) {
            const popup = buttonElement.closest('.leaflet-popup');
            const feature = popup._feature; // Supposons que la feature est stockée dans l'infobulle
            const thumbnails = await fetchObservationThumbnails(obsIds);
            popup.setContent(createPopupContent(thumbnails, feature, newPage));
        }

        // Chargement du GeoJSON
        async function loadGeoJSON() {
            try {
                const response = await fetch('osm_inat.geojson');
                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status}`);
                }
                const geojson = await response.json();

                // Ajout des marqueurs à la carte
                L.geoJSON(geojson, {
                    pointToLayer: function(feature, latlng) {
                        return L.marker(latlng, {
                            title: feature.properties.tags.name || "Observation"
                        });
                    },
                    onEachFeature: function(feature, layer) {
                        layer.on('click', async function() {
                            const obsIds = feature.properties.obs_ids;
                            if (!obsIds) {
                                layer.bindPopup("<p>Aucune observation iNaturalist associée.</p>").openPopup();
                                return;
                            }

                            // Afficher un message de chargement
                            layer.bindPopup("<p class='loading'>Chargement des vignettes...</p>").openPopup();

                            // Récupérer les vignettes
                            const thumbnails = await fetchObservationThumbnails(obsIds);

                            // Stocker la feature dans l'infobulle pour la pagination
                            const popup = layer.getPopup();
                            popup._feature = feature;

                            // Mettre à jour l'infobulle avec les vignettes (page 0 par défaut)
                            layer.setPopupContent(createPopupContent(thumbnails, feature, 0));
                        });
                    }
                }).addTo(map);

                // Ajuster la vue de la carte pour afficher toutes les données
                map.fitBounds(L.geoJSON(geojson).getBounds());
            } catch (error) {
                console.error("Erreur lors du chargement du GeoJSON:", error);
                alert("Erreur lors du chargement du GeoJSON. Vérifie que le fichier est accessible.");
            }
        }

        // Charger le GeoJSON au démarrage
        window.onload = loadGeoJSON;
    </script>
</body>
</html>
