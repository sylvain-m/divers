<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupérer les IDs d'observations iNaturalist par ID OSM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            white-space: pre-wrap;
        }
        #copyButton {
            display: none;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Récupérer les IDs d'observations iNaturalist par ID OSM</h1>
    <form id="osmForm">
        <label for="osm_url">URL du nœud OSM :</label>
        <input type="text" id="osm_url" name="osm_url"
               placeholder="Ex: https://www.openstreetmap.org/node/9922802696" required>
        <button type="submit">Récupérer les IDs</button>
    </form>
    <div id="result"></div>
    <button id="copyButton">Copier les IDs</button>

    <script>
        document.getElementById('osmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const osm_url = document.getElementById('osm_url').value;
            const resultDiv = document.getElementById('result');
            const copyButton = document.getElementById('copyButton');
            resultDiv.textContent = "Chargement...";
            copyButton.style.display = 'none';

            try {
                // Construction de l'URL de l'API iNaturalist
                const apiUrl = new URL('https://api.inaturalist.org/v1/observations');
                apiUrl.searchParams.append('field:OpenStreetMap (OSM)', osm_url);
                apiUrl.searchParams.append('verifiable', 'any');
                apiUrl.searchParams.append('per_page', '200');

                // Appel à l'API
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`Erreur API : ${response.status}`);
                }
                const data = await response.json();
                const observation_ids = data.results.map(obs => obs.id);

                // Affichage des résultats (séparés par des points-virgules)
                resultDiv.textContent = observation_ids.join(';');

                // Affichage du bouton "Copier"
                copyButton.style.display = 'block';
                copyButton.dataset.ids = observation_ids.join(';');
            } catch (error) {
                resultDiv.textContent = `Erreur : ${error.message}`;
            }
        });

        document.getElementById('copyButton').addEventListener('click', () => {
            const copyButton = document.getElementById('copyButton');
            navigator.clipboard.writeText(copyButton.dataset.ids)
                .then(() => alert('IDs copiés dans le presse-papiers !'))
                .catch(err => alert(`Erreur lors de la copie : ${err}`));
        });
    </script>
</body>
</html>
