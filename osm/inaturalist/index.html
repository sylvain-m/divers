<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNat 2 OSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .log-info {
            text-align: center;
            margin-bottom: 20px;
            color: #a0a0a0;
            font-size: 0.9em;
        }
        .table {
            color: #e0e0e0;
            background-color: #1e1e1e;
            border-color: #333;
            table-layout: fixed;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        .table thead th {
            background-color: #2d2d2d;
            color: #ffffff;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 10;
            max-width: 300px;
            width: 300px;
            text-align: center;
        }
        .table tbody td {
            border-bottom: 1px solid #333;
            background-color: #1e1e1e;
            max-width: 300px;
            width: 300px;
            vertical-align: top;
        }
        .table-hover tbody tr:hover {
            background-color: #2a2a2a;
        }
        a {
            color: #4da6ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .id-badge {
            background-color: #74ac00;
            color: #ffffff;
            margin: 2px;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
            font-size: 0.85em;
        }
        .osm-img {
            width: 32px;
            height: 32px;
            vertical-align: middle;
            margin-right: 8px;
        }
        .inat-img {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            margin-right: 8px;
        }
        .table-container {
            max-height: calc(100vh - 150px);
            overflow-y: auto;
            overflow-x: auto;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
        }
        .obs-ids-cell {
            word-break: break-all;
            white-space: normal;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>iNat 2 OSM</h1>
        <div id="logInfo" class="log-info">Loading log...</div>
        <div class="table-container">
            <table
                id="osmTable"
                class="table table-hover table-borderless"
                data-toggle="table"
                data-height="100%"
                data-pagination="false"
                data-search="false"
                data-show-columns="false"
                data-show-refresh="false"
                data-show-toggle="false"
            >
                <thead>
                    <tr>
                        <th data-field="osm_link">OSM Link</th>
                        <th data-field="inat_link">iNat Link</th>
                        <th data-field="obs_ids">iNat Observations IDs</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.js"></script>

    <script>
        fetch('inat_2_csv_log.txt')
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n').filter(line => line.trim() !== '');
                document.getElementById('logInfo').textContent = lines.length > 0
                    ? lines[lines.length - 1]
                    : "No log information available.";
            })
            .catch(() => {
                document.getElementById('logInfo').textContent = "Error loading log.";
            });

        fetch('osm_inat.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n');
                const tableBody = document.getElementById('tableBody');

                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === '') continue;

                    const rowData = rows[i].match(/(".*?"|[^",]+)(?=\s*,\s*|\s*$)/g) || [];
                    const row = document.createElement('tr');

                    const obsId = rowData[0] ? rowData[0].replace(/"/g, '').trim() : '';
                    const osmUrl = rowData[1] ? rowData[1].replace(/"/g, '').trim() : '';

                    let osmElement = '';
                    let osmId = '';
                    if (osmUrl) {
                        const urlParts = osmUrl.split('/');
                        osmElement = urlParts[urlParts.length - 2];
                        osmId = urlParts[urlParts.length - 1].replace(/\/$/, '');
                    }

                    const osmLinkCell = document.createElement('td');
                    const osmLink = document.createElement('a');
                    osmLink.href = osmUrl.replace(/\/$/, '');
                    osmLink.target = "_blank";

                    const osmImg = document.createElement('img');
                    osmImg.src = 'https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg';
                    osmImg.className = 'osm-img';
                    osmImg.alt = 'OpenStreetMap';
                    osmLink.appendChild(osmImg);
                    osmLink.appendChild(document.createTextNode(`${osmElement} ${osmId}`));
                    osmLinkCell.appendChild(osmLink);
                    row.appendChild(osmLinkCell);

                    const inatLinkCell = document.createElement('td');
                    const finalObsUrl = `https://www.inaturalist.org/observations?verifiable=any&id=${obsId}`;
                    const imgLink = document.createElement('a');
                    imgLink.href = finalObsUrl;
                    imgLink.target = "_blank";

                    const img = document.createElement('img');
                    img.src = 'https://static.inaturalist.org/wiki_page_attachments/3154-original.png';
                    img.className = 'inat-img';
                    img.alt = 'iNaturalist';
                    imgLink.appendChild(img);
                    imgLink.appendChild(document.createTextNode("1 Observation"));
                    inatLinkCell.appendChild(imgLink);
                    row.appendChild(inatLinkCell);

                    const obsIdsCell = document.createElement('td');
                    obsIdsCell.className = 'obs-ids-cell';
                    const badgeLink = document.createElement('a');
                    badgeLink.href = `https://www.inaturalist.org/observations/${obsId}`;
                    badgeLink.target = "_blank";
                    const badge = document.createElement('span');
                    badge.className = 'id-badge';
                    badge.textContent = obsId;
                    badgeLink.appendChild(badge);
                    obsIdsCell.appendChild(badgeLink);
                    row.appendChild(obsIdsCell);

                    tableBody.appendChild(row);
                }
            })
            .catch(() => {
                const tableBody = document.getElementById('tableBody');
                const errorRow = document.createElement('tr');
                const errorCell = document.createElement('td');
                errorCell.colSpan = 3;
                errorCell.textContent = 'Error loading data. Check if osm_inat.csv exists and is accessible.';
                errorCell.style.color = '#ff6b6b';
                errorRow.appendChild(errorCell);
                tableBody.appendChild(errorRow);
            });
    </script>
</body>
</html>
