<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNat 2 OSM - History</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.2.0"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #2b2b2b; /* Fond anthracite */
            color: #e0e0e0; /* Texte clair par défaut */
        }
        .header {
            height: 100px;
            background-color: #1e1e1e; /* Fond du bandeau légèrement plus foncé */
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #444; /* Bordure plus discrète */
            box-sizing: border-box;
            color: #e0e0e0; /* Texte clair */
        }
        .chart-container {
            flex: 1;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #e0e0e0; /* Texte clair */
        }
        .chart-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: #aaaaaa; /* Gris clair pour le texte de chargement */
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #ff6b6b; /* Rouge clair pour les erreurs */
            font-weight: bold;
        }
        #inatOsmChart {
            width: 100%;
            height: 100%;
            min-height: 0; /* Fix for flexbox in some browsers */
        }
        .osm-logo, .inat-logo {
            width: 48px;
            height: auto;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <a href="https://www.inaturalist.org" target="_blank">
                <img src="https://static.inaturalist.org/wiki_page_attachments/3154-original.png" class="inat-logo" alt="iNaturalist Logo">
            </a>
            iNat 2 OSM
            <a href="https://www.openstreetmap.org" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Openstreetmap_logo.svg" class="osm-logo" alt="OpenStreetMap Logo">
            </a>
        </h1>
        <p>Chart showing the trend in iNaturalist observations<br>linked to OpenStreetMap features (updated daily)</p>
    </div>
    <div class="chart-container">
        <div id="loading" class="loading">Loading data from GitHub...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div class="chart-wrapper">
            <canvas id="inatOsmChart" style="display: none;"></canvas>
        </div>
    </div>

    <script>
        // URL of the log file on GitHub (replace with your actual URL)
        const logFileUrl = 'inat_2_csv_log.txt';

        // Global variable to store the chart instance
        let inatOsmChart = null;

        // Function to parse log data and convert dates to Luxon DateTime objects
        function parseLogData(logText) {
            const lines = logText.trim().split('\n');
            const labels = [];
            const inatData = [];
            const osmData = [];

            lines.forEach(line => {
                const [dateTimeStr, rest] = line.split(' : ');
                if (dateTimeStr && rest) {
                    // Parse the date string into a Luxon DateTime object
                    const dateTime = luxon.DateTime.fromFormat(dateTimeStr, 'yyyy-MM-dd HH:mm:ss');
                    labels.push(dateTime);

                    const inatMatch = rest.match(/(\d+) iNat observations/);
                    const osmMatch = rest.match(/(\d+) OSM objects/);

                    if (inatMatch && osmMatch) {
                        inatData.push(parseInt(inatMatch[1]));
                        osmData.push(parseInt(osmMatch[1]));
                    }
                }
            });

            return { labels, inatData, osmData };
        }

        // Function to create or update the chart
        function createChart(labels, inatData, osmData) {
            const ctx = document.getElementById('inatOsmChart').getContext('2d');

            // Destroy previous chart if it exists
            if (inatOsmChart !== null) {
                inatOsmChart.destroy();
            }

            inatOsmChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'iNat observations',
                            data: inatData,
                            borderColor: 'rgba(116, 172, 0, 1)',
                            backgroundColor: 'rgba(116, 172, 0, 0.2)',
                            tension: 0.1,
                            fill: false
                        },
                        {
                            label: 'OSM objects',
                            data: osmData,
                            borderColor: 'rgba(112, 146, 255, 1)',
                            backgroundColor: 'rgba(112, 146, 255, 0.2)',
                            tension: 0.1,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            align: 'end'
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                tooltipFormat: 'yyyy-MM-dd HH:mm:ss',
                                displayFormats: {
                                    hour: 'HH:mm',
                                    day: 'yyyy-MM-dd',
                                    week: 'yyyy-MM-dd',
                                    month: 'yyyy-MM'
                                }
                            },
                            title: {
                                display: true,
                                text: 'Date/Time'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Nb. objects'
                            }
                        }
                    }
                }
            });
        }

        // Function to load and process the log file
        async function loadLogFile() {
            try {
                const response = await fetch(logFileUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const logText = await response.text();
                const { labels, inatData, osmData } = parseLogData(logText);

                // Hide loading/error messages and show the chart
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                document.getElementById('inatOsmChart').style.display = 'block';

                createChart(labels, inatData, osmData);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = `Error loading data: ${error.message}`;
                document.getElementById('error').style.display = 'block';
                console.error('Error loading log file:', error);
            }
        }

        // Load the log file when the page loads
        document.addEventListener('DOMContentLoaded', loadLogFile);
    </script>
</body>
</html>
