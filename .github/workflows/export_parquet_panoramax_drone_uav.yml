name: Export Panoramax UAV/Drone Sequences

on:
  schedule:
    - cron: '30 2 * * *'  # 2h30 UTC
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install DuckDB
        run: pip install duckdb

      - name: Create output directory
        run: mkdir -p osm/panoramax

      - name: Run DuckDB query and export GeoJSON
        run: |
          python3 -c "
          import duckdb
          conn = duckdb.connect()
          conn.execute('''
            INSTALL spatial;
            LOAD spatial;
            COPY (
                SELECT *
                FROM 'https://api.panoramax.xyz/data/geoparquet/panoramax.parquet'
                WHERE length(list_filter(semantics, s ->
                    s.key = 'transport' AND
                    (LOWER(s.value) = 'uav' OR LOWER(s.value) = 'drone')
                )) > 0
            ) TO 'osm/panoramax/sequences_uav_drone.geojson' WITH (FORMAT GDAL, DRIVER 'GeoJSON');
          ')
          "

      - name: Commit and push GeoJSON
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add osm/panoramax/sequences_uav_drone.geojson
          git commit -m "Mise à jour des séquences UAV/Drone (automatique)"
          git push
