name: Run iNat to OSM CSV Script Daily

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 heure de Paris (été)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run the script
        run: |
          cd osm/inaturalist
          python inat_2_osm.py
          cd ../..

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add osm/inaturalist/inat_osm.csv osm/inaturalist/osm_inat.csv osm/inaturalist/inat_2_csv_log.txt
          git commit -m "Mise à jour automatique des CSV et du log (exécution quotidienne)" --allow-empty
          git push
